<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收據掃描器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f5ede6 0%, #ebe4dd 100%);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 20px;
    }

    .header h1 {
      font-size: 28px;
      color: #5a4a42;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .header p {
      color: #8b7b73;
      font-size: 14px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .upload-zone {
      border: 2px dashed #c9b9ae;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #faf8f6;
    }

    .upload-zone:hover {
      border-color: #9d8b80;
      background: #f5f1ed;
    }

    .upload-zone.dragging {
      border-color: #6b5b52;
      background: #ede4d9;
    }

    .upload-zone input[type="file"] {
      display: none;
    }

    .upload-btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
      margin-top: 5px;
    }

    .upload-btn-group .btn {
      flex: 1;
      max-width: 160px;
      padding: 12px 10px;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #5a4a42;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .upload-hint {
      color: #9d8b80;
      font-size: 12px;
    }

    .preview-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #8b7b73;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #c9b9ae;
      border-top-color: #5a4a42;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-section {
      display: none;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5a4a42;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dcc9bc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #3a2a22;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #9d8b80;
      background: #faf8f6;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .items-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #dcc9bc;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 15px;
      background: #faf8f6;
    }

    .item-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
      padding: 10px;
      background: white;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid #ede4d9;
    }

    .item-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-original {
      color: #b0a299;
      font-size: 11px;
    }

    .item-row-selects {
      display: flex;
      gap: 6px;
    }

    .item-row-selects select {
      flex: 1;
      padding: 6px;
      font-size: 11px;
      border: 1px solid #dcc9bc;
      border-radius: 4px;
      color: #3a2a22;
      background: #faf8f6;
    }

    .stat-bar-row {
      margin-bottom: 12px;
    }

    .stat-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #5a4a42;
      margin-bottom: 4px;
    }

    .stat-bar-track {
      background: #ede4d9;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .stat-bar-fill {
      background: #9d8b80;
      height: 100%;
      border-radius: 4px;
    }

    .item-name {
      flex: 1;
      color: #3a2a22;
    }

    .item-price {
      color: #8b7b73;
      min-width: 50px;
      text-align: right;
    }

    .error {
      padding: 12px;
      background: #fde8e8;
      border: 1px solid #f5c9c9;
      border-radius: 6px;
      color: #8b4444;
      font-size: 13px;
      margin-bottom: 15px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #5a4a42;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #3a2a22;
    }

    .btn-primary:disabled {
      background: #c9b9ae;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #5a4a42;
      border: 1px solid #c9b9ae;
    }

    .btn-secondary:hover {
      background: #f5ede6;
      border-color: #9d8b80;
    }

    .success {
      padding: 12px;
      background: #e8f5e8;
      border: 1px solid #c9e8c9;
      border-radius: 6px;
      color: #2d5a2d;
      font-size: 13px;
      display: none;
    }

    .success.show {
      display: block;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .header h1 {
        font-size: 22px;
      }

      .card {
        padding: 14px;
      }

      .upload-zone {
        padding: 20px 12px;
      }

      .upload-btn-group .btn {
        max-width: none;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📝 收據掃描器</h1>
      <p>拍照或上傳收據，自動提取品項</p>
    </div>

    <div class="card">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📷</div>
        <div class="upload-text">選擇收據照片</div>
        <div class="upload-hint" style="margin-bottom: 15px;">支援 JPG, PNG</div>
        <div class="upload-btn-group">
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('cameraInput').click()">📷 拍照</button>
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">🖼️ 相簿</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
      </div>

      <div class="preview-img" id="preview" style="display: none;"></div>

      <div class="loading" id="loading">
        <span class="spinner"></span>掃描中...
      </div>

      <div class="error" id="error"></div>
      <div class="success" id="success"></div>
    </div>

    <div class="form-section" id="formSection">
      <div class="card">
        <h3 style="margin-bottom: 15px; font-size: 16px; color: #5a4a42;">確認資料</h3>

        <div class="form-group">
          <label>日期</label>
          <input type="date" id="date" required>
        </div>

        <div class="form-group">
          <label>店鋪</label>
          <input type="text" id="store" placeholder="APPRO">
        </div>

        <div class="form-group">
          <label>品項（已自動翻譯＋分類，可調整）</label>
          <div class="items-list" id="itemsList"></div>
        </div>

        <div class="form-group">
          <label>備註</label>
          <textarea id="notes" placeholder="任何補充資訊..."></textarea>
        </div>

        <div class="button-group">
          <button class="btn btn-secondary" onclick="resetForm()">重新掃描</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveToNotion()">儲存到 Notion</button>
        </div>
      </div>
    </div>

    <div class="form-section" id="statsSection">
      <div class="card">
        <h3 style="margin-bottom: 15px; font-size: 16px; color: #5a4a42;">📊 累計花費佔比</h3>
        <div id="statsTotal" style="font-size: 13px; color: #8b7b73; margin-bottom: 12px;"></div>
        <div id="statsBreakdown"></div>
        <div class="button-group">
          <button class="btn btn-primary" onclick="resetForm()">掃描下一張收據</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    const formSection = document.getElementById('formSection');
    const dateInput = document.getElementById('date');
    const itemsList = document.getElementById('itemsList');

    // 設定今天的日期
    dateInput.valueAsDate = new Date();

    let parsedItems = [];

    const CATEGORY_MAP = {
      '生鮮食材': ['肉類', '海鮮', '蔬菜', '水果'],
      '蛋奶製品': ['雞蛋', '牛奶', '起司', '優格'],
      '健康飲品': ['果汁', '豆乳', '功能飲料'],
      '加工食品': ['冷凍食品', '熟食', '火鍋料', '罐頭'],
      '調味料': ['調味料'],
      '麵包甜點': ['麵包甜點'],
      '日用品': ['清潔用品', '廚房用品', '生活用品'],
      '其他': ['其他']
    };
    const MAIN_CATEGORIES = Object.keys(CATEGORY_MAP);

    function renderItems() {
      itemsList.innerHTML = '';
      parsedItems.forEach((item, idx) => {
        // Guard against category/subCategory not in our map
        if (!CATEGORY_MAP[item.category]) item.category = '其他';
        if (!CATEGORY_MAP[item.category].includes(item.subCategory)) {
          item.subCategory = CATEGORY_MAP[item.category][0];
        }

        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-row-top">
            <div>
              <div>${item.translated}</div>
              <div class="item-original">${item.original || ''}</div>
            </div>
            <div class="item-price">¥${item.price}</div>
          </div>
          <div class="item-row-selects">
            <select data-idx="${idx}" class="cat-select">
              ${MAIN_CATEGORIES.map(c => `<option value="${c}" ${c === item.category ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <select data-idx="${idx}" class="subcat-select">
              ${CATEGORY_MAP[item.category].map(c => `<option value="${c}" ${c === item.subCategory ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
        `;
        itemsList.appendChild(row);
      });

      itemsList.querySelectorAll('.cat-select').forEach(el => {
        el.addEventListener('change', (e) => {
          const idx = e.target.dataset.idx;
          parsedItems[idx].category = e.target.value;
          parsedItems[idx].subCategory = CATEGORY_MAP[e.target.value][0];
          renderItems();
        });
      });
      itemsList.querySelectorAll('.subcat-select').forEach(el => {
        el.addEventListener('change', (e) => {
          parsedItems[e.target.dataset.idx].subCategory = e.target.value;
        });
      });
    }

    const cameraInput = document.getElementById('cameraInput');

    cameraInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    // 拖放
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragging');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragging');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragging');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('請選擇圖片檔案');
        return;
      }

      const reader = new FileReader();
      reader.onload = async (e) => {
        const imageData = e.target.result;
        preview.innerHTML = `<img src="${imageData}" class="preview-img">`;
        preview.style.display = 'block';
        uploadZone.style.display = 'none';

        loading.style.display = 'block';
        error.classList.remove('show');
        success.classList.remove('show');

        try {
          const response = await fetch('/api/parse-receipt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
          });

          if (!response.ok) throw new Error('解析失敗');
          const data = await response.json();

          parsedItems = data.items || [];
          renderItems();

          loading.style.display = 'none';
          formSection.style.display = 'block';
        } catch (err) {
          loading.style.display = 'none';
          showError(err.message);
          uploadZone.style.display = 'block';
          preview.style.display = 'none';
        }
      };
      reader.readAsDataURL(file);
    }

    function resetForm() {
      uploadZone.style.display = 'block';
      preview.style.display = 'none';
      formSection.style.display = 'none';
      document.getElementById('statsSection').style.display = 'none';
      fileInput.value = '';
      cameraInput.value = '';
      parsedItems = [];
      itemsList.innerHTML = '';
      error.classList.remove('show');
      success.classList.remove('show');
    }

    async function saveToNotion() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;

      const payload = {
        date: dateInput.value,
        store: document.getElementById('store').value || 'APPRO',
        items: parsedItems,
        notes: document.getElementById('notes').value
      };

      try {
        const response = await fetch('/api/save-notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('儲存失敗');

        showSuccess('已儲存到 Notion！正在計算統計...');
        formSection.style.display = 'none';
        await loadStats();
      } catch (err) {
        showError('儲存失敗: ' + err.message);
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        if (!response.ok) throw new Error('統計讀取失敗');
        const data = await response.json();

        document.getElementById('statsTotal').textContent =
          `共 ${data.recordCount} 筆紀錄，累計 ¥${data.grandTotal.toLocaleString()}`;

        const breakdown = document.getElementById('statsBreakdown');
        breakdown.innerHTML = '';

        data.categoryBreakdown.forEach(cat => {
          const row = document.createElement('div');
          row.className = 'stat-bar-row';
          row.innerHTML = `
            <div class="stat-bar-label">
              <span>${cat.name}</span>
              <span>¥${cat.total.toLocaleString()}（${cat.percentage}%）</span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill" style="width: ${cat.percentage}%;"></div>
            </div>
          `;
          breakdown.appendChild(row);
        });

        document.getElementById('statsSection').style.display = 'block';
      } catch (err) {
        showError('統計讀取失敗: ' + err.message);
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('show');
    }

    function showSuccess(msg) {
      success.textContent = msg;
      success.classList.add('show');
    }
  </script>
</body>
</html>
