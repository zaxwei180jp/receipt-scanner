<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收據掃描器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f5ede6 0%, #ebe4dd 100%);
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 20px;
      position: relative;
    }

    .header h1 {
      font-size: 26px;
      color: #5a4a42;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .header p {
      color: #8b7b73;
      font-size: 13px;
    }

    .back-btn {
      position: absolute;
      left: 0;
      top: 22px;
      background: none;
      border: none;
      color: #5a4a42;
      font-size: 14px;
      cursor: pointer;
      padding: 6px 10px;
    }

    .nav-btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .nav-btn {
      flex: 1;
      padding: 16px 10px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: white;
      color: #5a4a42;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .nav-btn .icon {
      font-size: 22px;
    }

    .nav-btn:active {
      background: #f5ede6;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .upload-zone {
      border: 2px dashed #c9b9ae;
      border-radius: 8px;
      padding: 30px 15px;
      text-align: center;
      background: #faf8f6;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #5a4a42;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .upload-hint {
      color: #9d8b80;
      font-size: 12px;
      margin-bottom: 15px;
    }

    .upload-btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    .upload-btn-group .btn {
      flex: 1;
      max-width: 160px;
      padding: 12px 10px;
    }

    .preview-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #8b7b73;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #c9b9ae;
      border-top-color: #5a4a42;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5a4a42;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dcc9bc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #3a2a22;
      background: white;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #9d8b80;
      background: #faf8f6;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .items-list {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid #dcc9bc;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 15px;
      background: #faf8f6;
    }

    .item-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
      padding: 10px;
      background: white;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid #ede4d9;
    }

    .item-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-original {
      color: #b0a299;
      font-size: 11px;
    }

    .item-row-selects {
      display: flex;
      gap: 6px;
    }

    .item-row-selects select {
      flex: 1;
      padding: 6px;
      font-size: 11px;
      border: 1px solid #dcc9bc;
      border-radius: 4px;
      color: #3a2a22;
      background: #faf8f6;
    }

    .item-price {
      color: #8b7b73;
      min-width: 50px;
      text-align: right;
    }

    .stat-bar-row {
      margin-bottom: 12px;
    }

    .stat-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #5a4a42;
      margin-bottom: 4px;
    }

    .stat-bar-track {
      background: #ede4d9;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .stat-bar-fill {
      background: #9d8b80;
      height: 100%;
      border-radius: 4px;
    }

    .stats-total-hero {
      text-align: center;
      padding: 10px 0 20px;
    }

    .stats-total-hero .amount {
      font-size: 32px;
      font-weight: 700;
      color: #5a4a42;
    }

    .stats-total-hero .label {
      font-size: 12px;
      color: #9d8b80;
      margin-top: 4px;
    }

    .trend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .trend-month {
      width: 60px;
      color: #5a4a42;
      flex-shrink: 0;
    }

    .trend-bar-track {
      flex: 1;
      background: #ede4d9;
      border-radius: 4px;
      height: 16px;
      overflow: hidden;
    }

    .trend-bar-fill {
      background: #9d8b80;
      height: 100%;
      border-radius: 4px;
    }

    .trend-amount {
      width: 70px;
      text-align: right;
      color: #5a4a42;
      flex-shrink: 0;
    }

    #categoryMonthTable th,
    #categoryMonthTable td {
      padding: 6px 8px;
      text-align: right;
      border-bottom: 1px solid #ede4d9;
      white-space: nowrap;
    }

    #categoryMonthTable th:first-child,
    #categoryMonthTable td:first-child {
      text-align: left;
      color: #5a4a42;
      font-weight: 600;
    }

    #categoryMonthTable th {
      color: #8b7b73;
      font-weight: 600;
    }

    .top-item-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #ede4d9;
      font-size: 13px;
    }

    .top-item-row:last-child {
      border-bottom: none;
    }

    .top-item-rank {
      color: #b0a299;
      width: 22px;
      flex-shrink: 0;
    }

    .top-item-name {
      flex: 1;
      color: #3a2a22;
    }

    .top-item-meta {
      color: #8b7b73;
      text-align: right;
    }

    .query-result-row {
      padding: 10px;
      border-bottom: 1px solid #ede4d9;
      font-size: 13px;
    }

    .query-result-row:last-child {
      border-bottom: none;
    }

    .query-result-top {
      display: flex;
      justify-content: space-between;
      color: #3a2a22;
    }

    .query-result-meta {
      color: #9d8b80;
      font-size: 11px;
      margin-top: 2px;
    }

    .empty-hint {
      text-align: center;
      color: #9d8b80;
      font-size: 13px;
      padding: 20px 0;
    }

    .error {
      padding: 12px;
      background: #fde8e8;
      border: 1px solid #f5c9c9;
      border-radius: 6px;
      color: #8b4444;
      font-size: 13px;
      margin-bottom: 15px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      padding: 12px;
      background: #e8f5e8;
      border: 1px solid #c9e8c9;
      border-radius: 6px;
      color: #2d5a2d;
      font-size: 13px;
      margin-bottom: 15px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #5a4a42;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #3a2a22;
    }

    .btn-primary:disabled {
      background: #c9b9ae;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #5a4a42;
      border: 1px solid #c9b9ae;
    }

    .btn-secondary:hover {
      background: #f5ede6;
      border-color: #9d8b80;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .header h1 {
        font-size: 22px;
      }

      .card {
        padding: 14px;
      }

      .upload-zone {
        padding: 20px 12px;
      }

      .upload-btn-group .btn {
        max-width: none;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .form-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" id="backBtn" style="display:none;">← 返回</button>
      <h1 id="pageTitle">📝 收據掃描器</h1>
      <p id="pageSubtitle">拍照上傳，自動翻譯、分類、統計</p>
    </div>

    <!-- HOME SCREEN -->
    <div class="screen active" id="homeScreen">
      <div class="nav-btn-group">
        <button class="nav-btn" onclick="showScan()">
          <span class="icon">📷</span>
          <span>掃描收據</span>
        </button>
        <button class="nav-btn" onclick="showQuery()">
          <span class="icon">🔍</span>
          <span>查詢紀錄</span>
        </button>
        <button class="nav-btn" onclick="showAnalysis()">
          <span class="icon">📊</span>
          <span>月度分析</span>
        </button>
      </div>

      <div class="card">
        <div class="stats-total-hero">
          <div class="amount" id="homeTotalAmount">¥0</div>
          <div class="label" id="homeTotalLabel">累計花費</div>
        </div>
        <div id="homeStatsBreakdown"></div>
        <div class="empty-hint" id="homeEmptyHint" style="display:none;">還沒有任何紀錄，掃描第一張收據吧！</div>
      </div>
    </div>

    <!-- SCAN SCREEN -->
    <div class="screen" id="scanScreen">
      <div class="card">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">📷</div>
          <div class="upload-text">選擇收據照片</div>
          <div class="upload-hint">支援 JPG, PNG</div>
          <div class="upload-btn-group">
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('cameraInput').click()">📷 拍照</button>
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">🖼️ 相簿</button>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none;">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        </div>

        <div class="preview-img" id="preview" style="display: none;"></div>
        <div class="loading" id="loading"><span class="spinner"></span>掃描中...</div>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
      </div>

      <div class="card" id="formSection" style="display:none;">
        <h3 style="margin-bottom: 15px; font-size: 16px; color: #5a4a42;">確認資料</h3>

        <div class="form-row">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label>店鋪</label>
            <input type="text" id="store" placeholder="APPRO">
          </div>
        </div>

        <div class="form-group">
          <label>品項（已自動翻譯＋分類，可調整）</label>
          <div class="items-list" id="itemsList"></div>
        </div>

        <div class="form-group">
          <label>備註</label>
          <textarea id="notes" placeholder="任何補充資訊..."></textarea>
        </div>

        <div class="button-group">
          <button class="btn btn-secondary" onclick="resetScan()">重新掃描</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveToNotion()">儲存到 Notion</button>
        </div>
      </div>
    </div>

    <!-- QUERY SCREEN -->
    <div class="screen" id="queryScreen">
      <div class="card">
        <div class="form-group">
          <label>日期（不選則查全部）</label>
          <input type="date" id="queryDate">
        </div>

        <div class="form-group">
          <label>主分類</label>
          <select id="queryCategory">
            <option value="">全部</option>
          </select>
        </div>

        <div class="form-group">
          <label>關鍵字（品項名稱）</label>
          <input type="text" id="queryKeyword" placeholder="例如：雞蛋">
        </div>

        <button class="btn btn-primary" style="width:100%;" onclick="runQuery()">搜尋</button>
      </div>

      <div class="card" id="queryResultCard" style="display:none;">
        <div id="queryResultSummary" style="font-size: 13px; color: #8b7b73; margin-bottom: 10px;"></div>
        <div id="queryResultList"></div>
      </div>

      <div class="error" id="queryError"></div>
    </div>

    <!-- ANALYSIS SCREEN -->
    <div class="screen" id="analysisScreen">
      <div class="card">
        <h3 style="margin-bottom: 12px; font-size: 15px; color: #5a4a42;">📈 每月支出趨勢</h3>
        <div id="monthlyTrendChart"></div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 12px; font-size: 15px; color: #5a4a42;">🍖 分類每月花費</h3>
        <div style="overflow-x: auto;">
          <table id="categoryMonthTable" style="width: 100%; border-collapse: collapse; font-size: 12px;"></table>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 12px; font-size: 15px; color: #5a4a42;">🏆 最常買的前 20 項商品</h3>
        <div id="topItemsList"></div>
      </div>

      <div class="error" id="analysisError"></div>
    </div>

    <!-- EDIT SCREEN -->
    <div class="screen" id="editScreen">
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="editDate">
          </div>
          <div class="form-group">
            <label>店鋪</label>
            <input type="text" id="editStore">
          </div>
        </div>

        <div class="form-group">
          <label>品項名稱</label>
          <input type="text" id="editName">
        </div>

        <div class="form-group">
          <label>金額</label>
          <input type="number" id="editAmount">
        </div>

        <div class="form-group">
          <label>分類</label>
          <div class="item-row-selects">
            <select id="editCategory"></select>
            <select id="editSubCategory"></select>
          </div>
        </div>

        <div class="form-group">
          <label>備註</label>
          <textarea id="editNotes"></textarea>
        </div>

        <div class="error" id="editError"></div>
        <div class="success" id="editSuccess"></div>

        <div class="button-group">
          <button class="btn btn-secondary" onclick="deleteRecord()" style="color:#8b4444; border-color:#f5c9c9;">🗑️ 刪除</button>
          <button class="btn btn-primary" onclick="saveEdit()">儲存修改</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CATEGORY_MAP = {
      '生鮮食材': ['肉類', '海鮮', '蔬菜', '水果'],
      '蛋奶製品': ['雞蛋', '牛奶', '起司', '優格'],
      '健康飲品': ['果汁', '豆乳', '功能飲料'],
      '加工食品': ['冷凍食品', '熟食', '火鍋料', '罐頭', '零食'],
      '調味料': ['調味料'],
      '麵包甜點': ['麵包甜點'],
      '日用品': ['清潔用品', '廚房用品', '生活用品'],
      '其他': ['其他']
    };
    const MAIN_CATEGORIES = Object.keys(CATEGORY_MAP);

    // ---------- Screen navigation ----------
    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');
    const backBtn = document.getElementById('backBtn');

    function switchScreen(id, title, subtitle, backAction) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      pageTitle.textContent = title;
      pageSubtitle.textContent = subtitle;
      if (backAction) {
        backBtn.style.display = 'block';
        backBtn.onclick = backAction;
      } else {
        backBtn.style.display = 'none';
        backBtn.onclick = null;
      }
    }

    function showHome() {
      switchScreen('homeScreen', '📝 收據掃描器', '拍照上傳，自動翻譯、分類、統計', null);
      loadStats();
    }

    function showScan() {
      switchScreen('scanScreen', '📷 掃描收據', '拍照或上傳收據照片', showHome);
    }

    function showQuery() {
      switchScreen('queryScreen', '🔍 查詢紀錄', '依日期、分類或關鍵字搜尋', showHome);
    }

    function showAnalysis() {
      switchScreen('analysisScreen', '📊 月度分析', '累積各月消費趨勢與排行', showHome);
      loadAnalysis();
    }

    // ---------- Home / Stats ----------
    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        if (!response.ok) throw new Error('統計讀取失敗');
        const data = await response.json();

        const homeEmptyHint = document.getElementById('homeEmptyHint');
        const breakdown = document.getElementById('homeStatsBreakdown');

        if (data.recordCount === 0) {
          document.getElementById('homeTotalAmount').textContent = '¥0';
          document.getElementById('homeTotalLabel').textContent = '尚無紀錄';
          breakdown.innerHTML = '';
          homeEmptyHint.style.display = 'block';
          return;
        }

        homeEmptyHint.style.display = 'none';
        document.getElementById('homeTotalAmount').textContent = `¥${data.grandTotal.toLocaleString()}`;
        document.getElementById('homeTotalLabel').textContent = `累計花費（共 ${data.recordCount} 筆）`;

        breakdown.innerHTML = '';
        data.categoryBreakdown.forEach(cat => {
          const row = document.createElement('div');
          row.className = 'stat-bar-row';
          row.innerHTML = `
            <div class="stat-bar-label">
              <span>${cat.name}</span>
              <span>¥${cat.total.toLocaleString()}（${cat.percentage}%）</span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill" style="width: ${cat.percentage}%;"></div>
            </div>
          `;
          breakdown.appendChild(row);
        });
      } catch (err) {
        console.error(err);
      }
    }

    // ---------- Scan flow ----------
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const cameraInput = document.getElementById('cameraInput');
    const preview = document.getElementById('preview');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    const formSection = document.getElementById('formSection');
    const dateInput = document.getElementById('date');
    const itemsList = document.getElementById('itemsList');

    dateInput.valueAsDate = new Date();

    let parsedItems = [];

    function renderItems() {
      itemsList.innerHTML = '';
      parsedItems.forEach((item, idx) => {
        if (!CATEGORY_MAP[item.category]) item.category = '其他';
        if (!CATEGORY_MAP[item.category].includes(item.subCategory)) {
          item.subCategory = CATEGORY_MAP[item.category][0];
        }

        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-row-top">
            <div>
              <div>${item.translated}</div>
              <div class="item-original">${item.original || ''}</div>
            </div>
            <div class="item-price">¥${item.price}</div>
          </div>
          <div class="item-row-selects">
            <select data-idx="${idx}" class="cat-select">
              ${MAIN_CATEGORIES.map(c => `<option value="${c}" ${c === item.category ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <select data-idx="${idx}" class="subcat-select">
              ${CATEGORY_MAP[item.category].map(c => `<option value="${c}" ${c === item.subCategory ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
        `;
        itemsList.appendChild(row);
      });

      itemsList.querySelectorAll('.cat-select').forEach(el => {
        el.addEventListener('change', (e) => {
          const idx = e.target.dataset.idx;
          parsedItems[idx].category = e.target.value;
          parsedItems[idx].subCategory = CATEGORY_MAP[e.target.value][0];
          renderItems();
        });
      });
      itemsList.querySelectorAll('.subcat-select').forEach(el => {
        el.addEventListener('change', (e) => {
          parsedItems[e.target.dataset.idx].subCategory = e.target.value;
        });
      });
    }

    cameraInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('請選擇圖片檔案');
        return;
      }

      const reader = new FileReader();
      reader.onload = async (e) => {
        const imageData = e.target.result;
        preview.innerHTML = `<img src="${imageData}" class="preview-img">`;
        preview.style.display = 'block';
        uploadZone.style.display = 'none';

        loading.classList.add('show');
        error.classList.remove('show');
        success.classList.remove('show');

        try {
          const response = await fetch('/api/parse-receipt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
          });

          if (!response.ok) throw new Error('解析失敗');
          const data = await response.json();

          parsedItems = data.items || [];
          renderItems();

          loading.classList.remove('show');
          formSection.style.display = 'block';
        } catch (err) {
          loading.classList.remove('show');
          showError(err.message);
          uploadZone.style.display = 'block';
          preview.style.display = 'none';
        }
      };
      reader.readAsDataURL(file);
    }

    function resetScan() {
      uploadZone.style.display = 'block';
      preview.style.display = 'none';
      formSection.style.display = 'none';
      fileInput.value = '';
      cameraInput.value = '';
      parsedItems = [];
      itemsList.innerHTML = '';
      error.classList.remove('show');
      success.classList.remove('show');
    }

    async function saveToNotion() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;

      const payload = {
        date: dateInput.value,
        store: document.getElementById('store').value || 'APPRO',
        items: parsedItems,
        notes: document.getElementById('notes').value
      };

      try {
        const response = await fetch('/api/save-notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('儲存失敗');

        showSuccess('已儲存到 Notion！');
        resetScan();
        showHome();
      } catch (err) {
        showError('儲存失敗: ' + err.message);
      } finally {
        saveBtn.disabled = false;
      }
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('show');
    }

    function showSuccess(msg) {
      success.textContent = msg;
      success.classList.add('show');
    }

    // ---------- Query ----------
    const queryCategorySelect = document.getElementById('queryCategory');
    MAIN_CATEGORIES.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      queryCategorySelect.appendChild(opt);
    });

    async function runQuery() {
      const queryError = document.getElementById('queryError');
      queryError.classList.remove('show');

      const selectedDate = document.getElementById('queryDate').value || undefined;
      const payload = {
        startDate: selectedDate,
        endDate: selectedDate,
        category: document.getElementById('queryCategory').value || undefined,
        keyword: document.getElementById('queryKeyword').value || undefined
      };

      try {
        const response = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('查詢失敗');
        const data = await response.json();

        const resultCard = document.getElementById('queryResultCard');
        const summary = document.getElementById('queryResultSummary');
        const list = document.getElementById('queryResultList');

        resultCard.style.display = 'block';
        summary.textContent = `共 ${data.count} 筆，總金額 ¥${data.total.toLocaleString()}`;
        list.innerHTML = '';

        if (data.records.length === 0) {
          list.innerHTML = '<div class="empty-hint">沒有符合條件的紀錄</div>';
          return;
        }

        data.records.forEach(r => {
          const row = document.createElement('div');
          row.className = 'query-result-row';
          row.style.cursor = 'pointer';
          row.innerHTML = `
            <div class="query-result-top">
              <span>${r.name}</span>
              <span>¥${r.amount.toLocaleString()}</span>
            </div>
            <div class="query-result-meta">${r.date} · ${r.store} · ${r.category}${r.subCategory ? ' / ' + r.subCategory : ''}</div>
          `;
          row.addEventListener('click', () => openEdit(r));
          list.appendChild(row);
        });
      } catch (err) {
        queryError.textContent = err.message;
        queryError.classList.add('show');
      }
    }

    // ---------- Monthly Analysis ----------
    async function loadAnalysis() {
      const analysisError = document.getElementById('analysisError');
      analysisError.classList.remove('show');

      try {
        const response = await fetch('/api/monthly-analysis');
        if (!response.ok) throw new Error('分析讀取失敗');
        const data = await response.json();

        if (data.months.length === 0) {
          document.getElementById('monthlyTrendChart').innerHTML = '<div class="empty-hint">還沒有任何紀錄</div>';
          document.getElementById('categoryMonthTable').innerHTML = '';
          document.getElementById('topItemsList').innerHTML = '';
          return;
        }

        // Trend chart
        const maxTotal = Math.max(...Object.values(data.monthlyTotal));
        const trendChart = document.getElementById('monthlyTrendChart');
        trendChart.innerHTML = data.months.map(m => {
          const total = data.monthlyTotal[m];
          const pct = maxTotal > 0 ? (total / maxTotal) * 100 : 0;
          return `
            <div class="trend-row">
              <div class="trend-month">${m}</div>
              <div class="trend-bar-track"><div class="trend-bar-fill" style="width:${pct}%;"></div></div>
              <div class="trend-amount">¥${total.toLocaleString()}</div>
            </div>
          `;
        }).join('');

        // Category table
        const table = document.getElementById('categoryMonthTable');
        const rows = [
          { label: '肉類', data: data.meatByMonth },
          { label: '蔬菜', data: data.vegByMonth },
          { label: '健康飲品(R-1/LG21)', data: data.healthDrinkByMonth },
          { label: '零食', data: data.snackByMonth },
          { label: '日用品', data: data.dailyByMonth }
        ];

        let html = '<tr><th>分類</th>' + data.months.map(m => `<th>${m}</th>`).join('') + '</tr>';
        rows.forEach(r => {
          html += `<tr><td>${r.label}</td>` +
            data.months.map(m => `<td>¥${(r.data[m] || 0).toLocaleString()}</td>`).join('') +
            '</tr>';
        });
        table.innerHTML = html;

        // Top items
        const topList = document.getElementById('topItemsList');
        topList.innerHTML = data.topItems.map((item, idx) => `
          <div class="top-item-row">
            <span class="top-item-rank">${idx + 1}</span>
            <span class="top-item-name">${item.name}</span>
            <span class="top-item-meta">買了 ${item.count} 次 · 共 ¥${item.total.toLocaleString()}</span>
          </div>
        `).join('');

      } catch (err) {
        analysisError.textContent = err.message;
        analysisError.classList.add('show');
      }
    }

    // ---------- Edit / Delete ----------
    let editingId = null;

    const editCategorySelect = document.getElementById('editCategory');
    const editSubCategorySelect = document.getElementById('editSubCategory');

    MAIN_CATEGORIES.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      editCategorySelect.appendChild(opt);
    });

    function refreshEditSubCategoryOptions() {
      const cat = editCategorySelect.value;
      const subs = CATEGORY_MAP[cat] || [];
      editSubCategorySelect.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    editCategorySelect.addEventListener('change', refreshEditSubCategoryOptions);

    function openEdit(record) {
      editingId = record.id;
      document.getElementById('editDate').value = record.date;
      document.getElementById('editStore').value = record.store;
      document.getElementById('editName').value = record.name;
      document.getElementById('editAmount').value = record.amount;
      document.getElementById('editNotes').value = record.notes || '';

      editCategorySelect.value = MAIN_CATEGORIES.includes(record.category) ? record.category : MAIN_CATEGORIES[0];
      refreshEditSubCategoryOptions();
      if (CATEGORY_MAP[editCategorySelect.value]?.includes(record.subCategory)) {
        editSubCategorySelect.value = record.subCategory;
      }

      document.getElementById('editError').classList.remove('show');
      document.getElementById('editSuccess').classList.remove('show');
      switchScreen('editScreen', '✏️ 編輯紀錄', '修改品項資料', showQuery);
    }

    async function saveEdit() {
      const editError = document.getElementById('editError');
      const editSuccess = document.getElementById('editSuccess');
      editError.classList.remove('show');
      editSuccess.classList.remove('show');

      const payload = {
        id: editingId,
        name: document.getElementById('editName').value,
        date: document.getElementById('editDate').value,
        store: document.getElementById('editStore').value,
        amount: parseFloat(document.getElementById('editAmount').value) || 0,
        category: editCategorySelect.value,
        subCategory: editSubCategorySelect.value,
        notes: document.getElementById('editNotes').value
      };

      try {
        const response = await fetch('/api/update-record', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('儲存失敗');

        editSuccess.textContent = '已更新！';
        editSuccess.classList.add('show');
        setTimeout(() => {
          showQuery();
          runQuery();
        }, 800);
      } catch (err) {
        editError.textContent = err.message;
        editError.classList.add('show');
      }
    }

    async function deleteRecord() {
      if (!confirm('確定要刪除這筆紀錄嗎？')) return;

      const editError = document.getElementById('editError');
      editError.classList.remove('show');

      try {
        const response = await fetch('/api/delete-record', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: editingId })
        });

        if (!response.ok) throw new Error('刪除失敗');

        showQuery();
        runQuery();
      } catch (err) {
        editError.textContent = err.message;
        editError.classList.add('show');
      }
    }

    // ---------- Init ----------
    loadStats();
  </script>
</body>
</html>
